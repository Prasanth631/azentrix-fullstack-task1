services:
  - type: web
    name: budget-tracker-api
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx tsc
    startCommand: node dist/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: NODE_ENV
        value: production
